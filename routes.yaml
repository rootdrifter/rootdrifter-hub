# Ghost dynamic routing.
# DESTINATION when Ghost is running: /home/exiled/ghost/rootdrifter-dev/content/settings/routes.yaml
# (Upload via Ghost Admin → Settings → Labs → Routes, or copy the file and `ghost restart`.)
#
# NOTE: corrected from the session directives' shorthand to valid Ghost YAML.
# Both the original directive (`/about/: page: about`) and the migration directive
# (`/portfolio/ironveil/: page: portfolio-ironveil`) use a `page:` key that is not valid Ghost
# routing syntax. The valid form binds a page with `data: page.<slug>` plus a `template:`.
# Static pages (About, Contact) are served automatically by Ghost at /{slug}/ once the pages
# exist, so they stay implicit. The /portfolio/<name>/ routes REQUIRE the matching Ghost pages
# (slugs portfolio-<name>) to exist — created from content/pages/portfolio-*.md via Admin API.

routes:
  /:
    template: index          # homepage renders index.hbs via its {{#is "home"}} branch
  /subscribe/:
    template: subscribe      # membership landing page (theme/subscribe.hbs)
  /portfolio/:
    template: portfolio-index
  /portfolio/ironveil/:
    data: page.portfolio-ironveil
    template: portfolio-project
  /portfolio/nullbyte/:
    data: page.portfolio-nullbyte
    template: portfolio-project
  /portfolio/spectre/:
    data: page.portfolio-spectre
    template: portfolio-project
  /portfolio/oracle/:
    data: page.portfolio-oracle
    template: portfolio-project
  /portfolio/mirage/:
    data: page.portfolio-mirage
    template: portfolio-project
  /portfolio/gauntlet/:
    data: page.portfolio-gauntlet
    template: portfolio-project

collections:
  /blog/:
    permalink: /blog/{slug}/
    template: index          # blog listing renders index.hbs via its {{else}} branch

taxonomies:
  tag: /tag/{slug}/
  # author archive re-enabled (2026-06-13): with author omitted, Ghost computes every author URL —
  # and the JSON-LD Article `author.url` on /about/ — as {site}/404/. Re-enabling it makes the author
  # entity valid (theme has no author.hbs → falls back to index.hbs post-list branch, renders fine).
  author: /author/{slug}/
