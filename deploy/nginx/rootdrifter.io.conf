# Nginx reverse proxy for Ghost — rootdrifter.io
# Place at /etc/nginx/sites-available/rootdrifter.io.conf and symlink into sites-enabled/.
# Obtain certs first:  certbot --nginx -d rootdrifter.io -d www.rootdrifter.io
# Then: nginx -t && systemctl reload nginx
#
# Assumes Ghost runs on 127.0.0.1:2368 (loopback only — never expose Ghost's port publicly).

# ---- www -> naked domain (canonical host) -----------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name www.rootdrifter.io;
    # Let Certbot answer ACME challenges over HTTP before redirecting.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://rootdrifter.io$request_uri; }
}
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.rootdrifter.io;
    ssl_certificate     /etc/letsencrypt/live/rootdrifter.io/fullchain.pem;   # [LETSENCRYPT PATH]
    ssl_certificate_key /etc/letsencrypt/live/rootdrifter.io/privkey.pem;     # [LETSENCRYPT PATH]
    return 301 https://rootdrifter.io$request_uri;
}

# ---- HTTP -> HTTPS for the naked domain -------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name rootdrifter.io;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://rootdrifter.io$request_uri; }
}

# ---- Main HTTPS vhost --------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name rootdrifter.io;

    ssl_certificate     /etc/letsencrypt/live/rootdrifter.io/fullchain.pem;   # [LETSENCRYPT PATH]
    ssl_certificate_key /etc/letsencrypt/live/rootdrifter.io/privkey.pem;     # [LETSENCRYPT PATH]
    # Modern TLS only (Cloudflare in front can enforce TLS 1.2+ as well).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 50m;   # Ghost image/theme uploads

    # ---- Security headers ----------------------------------------------------
    # HSTS: force HTTPS for 1 year incl. subdomains. Only enable once HTTPS is stable
    # (a bad cert then locks clients out for max-age). Cloudflare can also set this.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Disallow framing — defends against clickjacking (the blog is never meant to be iframed).
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Stop browsers MIME-sniffing responses away from the declared Content-Type.
    add_header X-Content-Type-Options "nosniff" always;
    # Legacy reflected-XSS filter toggle (modern browsers ignore it; harmless, defence-in-depth).
    add_header X-XSS-Protection "1; mode=block" always;
    # Send only the origin on cross-origin navigations — limits referrer leakage.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Drop access to powerful APIs the blog never uses.
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    # CSP: allow self + Google Fonts (the theme loads Share Tech Mono / Barlow). 'unsafe-inline'
    # is required for Ghost's injected Portal/styles and the theme's small inline scripts; tighten
    # to nonces later if the inline scripts are externalised.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' https: data:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline'; connect-src 'self'; frame-src 'self'; base-uri 'self'; form-action 'self'" always;

    # ---- Ghost admin: same proxy, but rate-limit-friendly comment ------------
    # Ghost serves admin at /ghost/. Restrict by IP here if you want admin locked down:
    location /ghost/ {
        # allow 203.0.113.0/24;  deny all;   # [optional admin IP allowlist]
        proxy_pass http://127.0.0.1:2368;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Everything else -> Ghost -------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:2368;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }
}
